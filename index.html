<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DUS Çalışma Planı</title>
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DUS Plan">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#161920;--border:#2a2f3d;--text:#e8eaf0;--muted:#6b7280;--b1:#4f8ef7;--b2:#a78bfa;--b3:#fb923c;--b4:#34d399;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px;}

/* ── HEADER ── */
header{text-align:center;padding:32px 24px 20px;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5vw,2.8rem);font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:6px;}
header p{color:var(--muted);font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace;}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0f1117;border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.58rem;cursor:pointer;transition:color 0.2s;letter-spacing:0.03em;}
.nav-btn .icon{font-size:1.3rem;}
.nav-btn.active{color:#a5b4fc;}

/* ── PAGES ── */
.page{display:none;padding:0 16px;}
.page.active{display:block;}

/* ── PROGRAM TABS ── */
.prog-tabs{display:flex;gap:8px;justify-content:center;margin:16px 0 20px;flex-wrap:wrap;}
.prog-btn{padding:9px 22px;border-radius:24px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Mono',monospace;font-size:0.78rem;cursor:pointer;transition:all 0.2s;}
.prog-btn.active{background:linear-gradient(135deg,#1e3a5f,#4c1d95);border-color:#6366f1;color:#fff;}
.prog-content{display:none;}
.prog-content.active{display:block;}

/* ── LEGEND ── */
.legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:0.74rem;color:var(--muted);font-family:'DM Mono',monospace;}
.legend-dot{width:20px;height:8px;border-radius:2px;}

/* ── TIMELINE ── */
.timeline-wrapper{max-width:960px;margin:0 auto;position:relative;}
.timeline-wrapper::before{content:'';position:absolute;left:29px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,#4f8ef7,#a78bfa,#fb923c,#34d399,#facc15);border-radius:2px;opacity:0.3;}
.timeline-phase{display:flex;gap:14px;margin-bottom:14px;position:relative;}
.phase-dot{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;flex-shrink:0;position:relative;z-index:1;border:2px solid;align-self:flex-start;margin-top:3px;}
.phase-body{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.phase-header{padding:11px 15px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.phase-title{font-weight:600;font-size:0.9rem;}
.phase-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.phase-range{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--muted);}
.phase-days-badge{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:2px 8px;}
.phase-days-badge strong{color:var(--text);}
.phase-subjects{padding:10px 15px;display:flex;flex-direction:column;gap:6px;}
.phase-subject-row{display:flex;align-items:center;gap:8px;}
.ps-name{font-size:0.78rem;color:var(--text);width:140px;flex-shrink:0;}
.ps-bars{display:flex;gap:3px;flex:1;}
.ps-bar{height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.85);white-space:nowrap;padding:0 6px;flex-shrink:0;}
.ps-konu{background:linear-gradient(135deg,#1e40af,#3b82f6);}
.ps-soru{background:linear-gradient(135deg,#9d174d,#ec4899);}
.ps-gun{background:linear-gradient(135deg,#1e3a5f,#6366f1);}
.ps-tekrar{background:linear-gradient(135deg,#78350f,#d97706);border:1px solid rgba(251,191,36,0.3);}
.ps-brans{background:linear-gradient(135deg,#7c1d6f,#db2777);}
.ps-genel{background:linear-gradient(135deg,#064e3b,#059669);}
.ps-days{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--muted);white-space:nowrap;width:30px;text-align:right;}
.phase-type-label{display:inline-block;padding:2px 7px;border-radius:6px;font-family:'DM Mono',monospace;font-size:0.64rem;font-weight:500;margin-right:4px;letter-spacing:0.05em;}
.label-blok{background:rgba(79,142,247,0.15);color:#93c5fd;border:1px solid rgba(79,142,247,0.3);}
.label-tekrar{background:rgba(250,204,21,0.12);color:#fde047;border:1px solid rgba(250,204,21,0.3);}
.label-genel{background:rgba(52,211,153,0.12);color:#6ee7b7;border:1px solid rgba(52,211,153,0.3);}
.progress-row{display:flex;align-items:center;gap:8px;padding:7px 15px 10px;border-top:1px solid var(--border);}
.progress-track{flex:1;height:4px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;}
.progress-label{font-family:'DM Mono',monospace;font-size:0.64rem;color:var(--muted);white-space:nowrap;}

/* ── CALENDAR ── */
.cal-header-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);margin:-0px -16px 0;position:sticky;top:0;z-index:10;}
.cal-nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-month-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;}
.cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:8px 0 4px;border-bottom:1px solid var(--border);}
.cal-grid-header span{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
.cal-cell{background:var(--bg);min-height:56px;padding:3px;position:relative;overflow:hidden;}
.cal-cell.other-month{opacity:0.3;}
.cal-cell.today .cal-num{background:#6366f1;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-num{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);margin-bottom:2px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-event{border-radius:3px;padding:1px 4px;font-size:0.55rem;font-family:'DM Mono',monospace;color:#fff;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;}
.cal-start-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin:12px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.cal-start-section label{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted);}
.cal-start-section input[type=date]{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.82rem;padding:7px 10px;}
.cal-start-section input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);}
.cal-gen-btn{padding:7px 18px;border-radius:18px;border:none;background:linear-gradient(135deg,#1e40af,#7c3aed);color:#fff;font-family:'DM Mono',monospace;font-size:0.78rem;cursor:pointer;}

/* ── STOPWATCH ── */
.sw-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:32px;padding:20px;}
.sw-display{font-family:'DM Mono',monospace;font-size:clamp(3.5rem,18vw,6rem);font-weight:500;color:var(--text);letter-spacing:0.05em;text-align:center;line-height:1;}
.sw-ms{font-size:clamp(1.5rem,8vw,2.5rem);color:var(--muted);}
.sw-btns{display:flex;gap:20px;}
.sw-btn{width:80px;height:80px;border-radius:50%;border:none;font-size:1rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:transform 0.1s;}
.sw-btn:active{transform:scale(0.94);}
.sw-start{background:linear-gradient(135deg,#059669,#34d399);color:#fff;}
.sw-stop{background:linear-gradient(135deg,#9d174d,#ec4899);color:#fff;}
.sw-reset{background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.sw-today{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;width:100%;max-width:320px;}
.sw-today-label{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);margin-bottom:4px;}
.sw-today-val{font-family:'DM Mono',monospace;font-size:1.6rem;color:#a5b4fc;font-weight:500;}

/* ── SOURCE TRACKER ── */
.tracker-page{padding:8px 0;}
.tracker-section{margin-bottom:20px;}
.tracker-block-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;padding:8px 4px 6px;display:flex;align-items:center;gap:8px;}
.tracker-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.tracker-table th{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.03);}
.tracker-table th:first-child{text-align:left;padding-left:12px;}
.tracker-table td{padding:8px 6px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;}
.tracker-table td:first-child{font-size:0.82rem;font-weight:500;text-align:left;padding-left:12px;}
.tracker-table tr:last-child td{border-bottom:none;}
.tracker-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:none;font-size:1rem;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.tracker-btn.done{background:rgba(52,211,153,0.15);border-color:rgba(52,211,153,0.4);}
.tracker-btn.not-done{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);}
.tracker-btn.empty{background:rgba(255,255,255,0.03);}
.add-source-row{display:flex;gap:8px;margin-top:8px;padding:0 4px;}
.add-source-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.78rem;padding:7px 10px;}
.add-source-btn{padding:7px 14px;border-radius:8px;border:none;background:rgba(99,102,241,0.2);color:#a5b4fc;font-family:'DM Mono',monospace;font-size:0.75rem;cursor:pointer;}

@media(max-width:400px){.ps-name{width:100px;}.phase-dot{width:46px;height:46px;font-size:0.9rem;}.timeline-wrapper::before{left:23px;}}
</style>
</head>
<body>

<header>
  <h1>DUS Çalışma Planı</h1>
  <p>14 ders · 4 blok · 2 program</p>
</header>

<!-- ── PAGES ── -->
<div id="page-program" class="page active">
  <div class="prog-tabs">
    <button class="prog-btn active" onclick="switchProg('oncesi',this)">🎓 Mezuniyet Öncesi</button>
    <button class="prog-btn" onclick="switchProg('sonrasi',this)">✅ Mezuniyet Sonrası</button>
  </div>

  <!-- Öncesi -->
  <div id="prog-oncesi" class="prog-content active">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#1e40af,#3b82f6)"></div>Konu</div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#9d174d,#ec4899)"></div>Soru</div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#78350f,#d97706)"></div>Tekrar</div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#7c1d6f,#db2777)"></div>Branş Den.</div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#064e3b,#059669)"></div>Genel Den.</div>
    </div>
    <div class="timeline-wrapper" id="oncesi-timeline"></div>
  </div>

  <!-- Sonrası -->
  <div id="prog-sonrasi" class="prog-content">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#1e3a5f,#6366f1)"></div>Çalışma</div>
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#78350f,#d97706)"></div>Tekrar + Genel Den.</div>
    </div>
    <div class="timeline-wrapper" id="sonrasi-timeline"></div>
  </div>
</div>

<!-- TAKVİM PAGE -->
<div id="page-takvim" class="page">
  <div class="prog-tabs" style="margin-top:16px;">
    <button class="prog-btn active" onclick="switchCalProg('oncesi',this)">🎓 Öncesi</button>
    <button class="prog-btn" onclick="switchCalProg('sonrasi',this)">✅ Sonrası</button>
  </div>
  <div id="cal-oncesi" class="cal-prog active">
    <div class="cal-start-section">
      <label>Başlangıç:</label>
      <input type="date" id="cal-oncesi-date">
      <button class="cal-gen-btn" onclick="generateCal('oncesi')">Oluştur</button>
    </div>
    <div id="cal-oncesi-header-bar" class="cal-header-bar" style="display:none;">
      <button class="cal-nav-btn" onclick="calNav('oncesi',-1)">‹</button>
      <div class="cal-month-title" id="cal-oncesi-title"></div>
      <button class="cal-nav-btn" onclick="calNav('oncesi',1)">›</button>
    </div>
    <div class="cal-grid-header" id="cal-oncesi-dow" style="display:none;">
      <span>Pzt</span><span>Sal</span><span>Çar</span><span>Per</span><span>Cum</span><span>Cmt</span><span>Paz</span>
    </div>
    <div class="cal-grid" id="cal-oncesi-grid"></div>
  </div>
  <div id="cal-sonrasi" class="cal-prog" style="display:none;">
    <div class="cal-start-section">
      <label>Başlangıç:</label>
      <input type="date" id="cal-sonrasi-date">
      <button class="cal-gen-btn" onclick="generateCal('sonrasi')">Oluştur</button>
    </div>
    <div id="cal-sonrasi-header-bar" class="cal-header-bar" style="display:none;">
      <button class="cal-nav-btn" onclick="calNav('sonrasi',-1)">‹</button>
      <div class="cal-month-title" id="cal-sonrasi-title"></div>
      <button class="cal-nav-btn" onclick="calNav('sonrasi',1)">›</button>
    </div>
    <div class="cal-grid-header" id="cal-sonrasi-dow" style="display:none;">
      <span>Pzt</span><span>Sal</span><span>Çar</span><span>Per</span><span>Cum</span><span>Cmt</span><span>Paz</span>
    </div>
    <div class="cal-grid" id="cal-sonrasi-grid"></div>
  </div>
</div>

<!-- KRONOMETRE PAGE -->
<div id="page-krono" class="page">
  <div class="sw-page">
    <div class="sw-display">
      <span id="sw-h">00</span>:<span id="sw-m">00</span>:<span id="sw-s">00</span><span class="sw-ms">.<span id="sw-ms">00</span></span>
    </div>
    <div class="sw-btns">
      <button class="sw-btn sw-reset" onclick="swReset()">Sıfırla</button>
      <button class="sw-btn sw-start" id="sw-main-btn" onclick="swToggle()">Başlat</button>
    </div>
    <div class="sw-today">
      <div class="sw-today-label">Bugünkü toplam çalışma süresi</div>
      <div class="sw-today-val" id="sw-today-display">00:00:00</div>
    </div>
    <div id="sw-history" style="width:100%;max-width:320px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;"></div>
  </div>
</div>

<!-- KAYNAK TAKİP PAGE -->
<div id="page-kaynak" class="page">
  <div class="tracker-page" id="tracker-content"></div>
  <div class="add-source-row">
    <input type="text" class="add-source-input" id="new-source-input" placeholder="Yeni kaynak ekle...">
    <button class="add-source-btn" onclick="addSource()">+ Ekle</button>
  </div>
</div>

<!-- ── BOTTOM NAV ── -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchPage('program',this)"><span class="icon">📋</span>Program</button>
  <button class="nav-btn" onclick="switchPage('takvim',this)"><span class="icon">📅</span>Takvim</button>
  <button class="nav-btn" onclick="switchPage('krono',this)"><span class="icon">⏱</span>Krono</button>
  <button class="nav-btn" onclick="switchPage('kaynak',this)"><span class="icon">📚</span>Kaynaklar</button>
</nav>

<script>
// ══════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════
const blockDefs=[
  {block:1,title:"Anatomi · Patoloji · Cerrahi · Radyoloji",color:"#4f8ef7",dotBg:"rgba(79,142,247,0.15)",
   subjects:[{name:"Anatomi",konu:1,soru:1},{name:"Patoloji",konu:1,soru:1},{name:"Cerrahi",konu:1,soru:1},{name:"Radyoloji",konu:1,soru:1}]},
  {block:2,title:"Biyokimya · Fizyoloji · Farmakoloji",color:"#a78bfa",dotBg:"rgba(167,139,250,0.15)",
   subjects:[{name:"Biyokimya",konu:1,soru:1},{name:"Fizyoloji",konu:1,soru:1},{name:"Farmakoloji",konu:1,soru:1}]},
  {block:3,title:"Periodontoloji · Mikrobiyoloji · Ortodonti",color:"#fb923c",dotBg:"rgba(251,146,60,0.15)",
   subjects:[{name:"Periodontoloji",konu:1,soru:1},{name:"Mikrobiyoloji",konu:1,soru:1},{name:"Ortodonti",konu:1,soru:1}]},
  {block:4,title:"Endodonti · Restorative · Pedodonti · Protez",color:"#34d399",dotBg:"rgba(52,211,153,0.15)",
   subjects:[{name:"Endodonti",konu:1,soru:1},{name:"Restorative",konu:1,soru:1},{name:"Pedodonti",konu:1,soru:1},{name:"Protez",konu:1,soru:1}]}
];

function blockDays(b){return b.subjects.reduce((a,s)=>a+s.konu+s.soru,0);}

const phasesOncesi=[
  {type:'blok',blokIdx:0},{type:'blok',blokIdx:1},
  {type:'tekrar',prevBlokIdx:0,label:"1. Blok Tekrarı"},
  {type:'blok',blokIdx:2},
  {type:'tekrar',prevBlokIdx:1,label:"2. Blok Tekrarı"},
  {type:'blok',blokIdx:3},
  {type:'tekrar',prevBlokIdx:2,label:"3. Blok Tekrarı"},
  {type:'blok',blokIdx:0},
  {type:'tekrar',prevBlokIdx:3,label:"4. Blok Tekrarı"},
  {type:'genel',label:"Genel Deneme"},
  {type:'blok',blokIdx:1},
  {type:'tekrar',prevBlokIdx:0,label:"1. Blok Tekrarı"},
  {type:'genel',label:"Genel Deneme"},
  {type:'blok',blokIdx:2},
  {type:'tekrar',prevBlokIdx:1,label:"2. Blok Tekrarı"},
  {type:'genel',label:"Genel Deneme"},
  {type:'blok',blokIdx:3},
  {type:'tekrar',prevBlokIdx:2,label:"3. Blok Tekrarı"},
  {type:'genel',label:"Genel Deneme"},
];

const phasesSonrasi=[
  {type:'blok',blokIdx:0},{type:'blok',blokIdx:1},
  {type:'tekrar-s',prevBlokIdx:0,label:"1. Blok Tekrarı + Genel Deneme"},
  {type:'blok',blokIdx:2},
  {type:'tekrar-s',prevBlokIdx:1,label:"2. Blok Tekrarı + Genel Deneme"},
  {type:'blok',blokIdx:3},
  {type:'tekrar-s',prevBlokIdx:2,label:"3. Blok Tekrarı + Genel Deneme"},
  {type:'blok',blokIdx:0},
  {type:'tekrar-s',prevBlokIdx:3,label:"4. Blok Tekrarı + Genel Deneme"},
  {type:'blok',blokIdx:1},
  {type:'tekrar-s',prevBlokIdx:null,allBlocks:true,label:"Tüm Bloklar Tekrarı + Genel Deneme"},
  {type:'blok',blokIdx:2},
  {type:'tekrar-s',prevBlokIdx:null,allBlocks:true,label:"Tüm Bloklar Tekrarı + Genel Deneme"},
  {type:'blok',blokIdx:3},
  {type:'tekrar-s',prevBlokIdx:null,allBlocks:true,label:"Tüm Bloklar Tekrarı + Genel Deneme"},
];

// ══════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════
function switchPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
}

function switchProg(name,btn){
  document.querySelectorAll('.prog-content').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.prog-tabs .prog-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('prog-'+name).classList.add('active');
  btn.classList.add('active');
}

// ══════════════════════════════════════════════════
// TIMELINE RENDER
// ══════════════════════════════════════════════════
function renderTimeline(containerId, phases, mode){
  const el=document.getElementById(containerId);
  let totalDays=0;
  phases.forEach(ph=>{
    if(ph.type==='blok') totalDays+=mode==='oncesi'?blockDays(blockDefs[ph.blokIdx]):blockDefs[ph.blokIdx].subjects.length;
    else totalDays+=1;
  });

  const passCount=[0,0,0,0];
  const passLabels=['','(2. geçiş)','(3. geçiş)'];
  let day=0;

  phases.forEach(ph=>{
    const div=document.createElement('div');
    div.className='timeline-phase';
    let dotColor,dotBg,dotText,title,typeLabel,phaseDays,subHTML;

    if(ph.type==='blok'){
      const b=blockDefs[ph.blokIdx];
      passCount[ph.blokIdx]++;
      const pass=passCount[ph.blokIdx];
      const passStr=pass>1?` <span style="font-size:0.7rem;opacity:0.6">${passLabels[pass-1]}</span>`:'';
      dotColor=b.color;dotBg=b.dotBg;dotText=b.block;
      title=`${b.block}. Blok${passStr}`;
      typeLabel=`<span class="phase-type-label label-blok">BLOK</span>`;
      phaseDays=mode==='oncesi'?blockDays(b):b.subjects.length;

      if(mode==='oncesi'){
        subHTML=b.subjects.map(s=>`
          <div class="phase-subject-row">
            <div class="ps-name">${s.name}</div>
            <div class="ps-bars">
              <div class="ps-bar ps-konu" style="width:${Math.max(s.konu*34,28)}px">${s.konu} gün</div>
              <div class="ps-bar ps-soru" style="width:${Math.max(s.soru*34,28)}px">${s.soru} gün</div>
            </div>
            <div class="ps-days">${s.konu+s.soru}g</div>
          </div>`).join('')
        +`<div class="phase-subject-row" style="margin-top:6px;padding-top:7px;border-top:1px solid #2a2f3d">
            <div class="ps-name" style="color:#f472b6">🩷 Branş Denemesi</div>
            <div class="ps-bars"><div class="ps-bar ps-brans" style="width:140px">${b.block}. Blok</div></div>
            <div class="ps-days" style="color:#f472b6;font-size:0.6rem">+0g</div>
          </div>`;
      } else {
        subHTML=b.subjects.map(s=>`
          <div class="phase-subject-row">
            <div class="ps-name">${s.name}</div>
            <div class="ps-bars"><div class="ps-bar ps-gun" style="width:34px">1g</div></div>
            <div class="ps-days">1g</div>
          </div>`).join('');
      }

    } else if(ph.type==='tekrar'){
      const b=blockDefs[ph.prevBlokIdx];
      phaseDays=1;dotColor='#facc15';dotBg='rgba(250,204,21,0.12)';dotText='↺';
      title=ph.label;typeLabel=`<span class="phase-type-label label-tekrar">TEKRAR</span>`;
      subHTML=b.subjects.map(s=>`
        <div class="phase-subject-row">
          <div class="ps-name" style="color:${b.color}">${s.name}</div>
          <div class="ps-bars"><div class="ps-bar ps-tekrar" style="width:54px">tekrar</div></div>
          <div class="ps-days" style="opacity:0.4">—</div>
        </div>`).join('')
      +`<div class="phase-subject-row" style="margin-top:4px;padding-top:6px;border-top:1px solid #2a2f3d">
          <div class="ps-name" style="color:#facc15;font-size:0.7rem">Toplam</div>
          <div class="ps-bars"></div>
          <div class="ps-days" style="color:#facc15;font-weight:600">1g</div>
        </div>`;

    } else if(ph.type==='tekrar-s'){
      const subs=ph.allBlocks?blockDefs.flatMap(b=>b.subjects.map(s=>({name:s.name,color:b.color}))):blockDefs[ph.prevBlokIdx].subjects.map(s=>({name:s.name,color:blockDefs[ph.prevBlokIdx].color}));
      phaseDays=1;dotColor='#facc15';dotBg='rgba(250,204,21,0.12)';dotText='↺';
      title=ph.label;typeLabel=`<span class="phase-type-label label-tekrar">TEKRAR</span>`;
      subHTML=`<div class="phase-subject-row" style="margin-bottom:5px">
          <div class="ps-name" style="color:#34d399;font-size:0.72rem">☀️ Sabah · Genel Deneme</div>
          <div class="ps-bars"><div class="ps-bar ps-genel" style="width:160px">Tüm bloklar · tam deneme</div></div>
          <div class="ps-days" style="color:#34d399">✓</div>
        </div>
        <div style="height:1px;background:#2a2f3d;margin:3px 0 6px"></div>`
      +subs.map(s=>`
        <div class="phase-subject-row">
          <div class="ps-name" style="color:${s.color}">${s.name}</div>
          <div class="ps-bars"><div class="ps-bar ps-tekrar" style="width:54px">tekrar</div></div>
          <div class="ps-days" style="opacity:0.4">—</div>
        </div>`).join('')
      +`<div class="phase-subject-row" style="margin-top:4px;padding-top:6px;border-top:1px solid #2a2f3d">
          <div class="ps-name" style="color:#facc15;font-size:0.7rem">Toplam</div>
          <div class="ps-bars"></div>
          <div class="ps-days" style="color:#facc15;font-weight:600">1g</div>
        </div>`;

    } else if(ph.type==='genel'){
      phaseDays=1;dotColor='#34d399';dotBg='rgba(52,211,153,0.12)';dotText='✦';
      title='Genel Deneme';typeLabel=`<span class="phase-type-label label-genel">GENEL DEN.</span>`;
      subHTML=`<div class="phase-subject-row">
        <div class="ps-name" style="color:#34d399">Genel Deneme</div>
        <div class="ps-bars"><div class="ps-bar ps-genel" style="width:100px">1 gün</div></div>
        <div class="ps-days">1g</div>
      </div>`;
    }

    const s=Math.round((day+Number.EPSILON)*10)/10;
    day+=phaseDays;
    const e=Math.round((day+Number.EPSILON)*10)/10;
    const pct=Math.round((day/totalDays)*100);
    const fill=ph.type==='blok'?blockDefs[ph.blokIdx].color:ph.type==='genel'?'#34d399':'#facc15';
    const dDisp=Number.isInteger(phaseDays)?phaseDays:Math.round(phaseDays*10)/10;

    div.innerHTML=`
      <div class="phase-dot" style="color:${dotColor};background:${dotBg};border-color:${dotColor}55">${dotText}</div>
      <div class="phase-body" style="border-color:${dotColor}28">
        <div class="phase-header" style="border-bottom-color:${dotColor}18">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:3px">${typeLabel}<span class="phase-title" style="color:${dotColor}">${title}</span></div>
          <div class="phase-meta">
            <span class="phase-range">Gün ${s}–${e}</span>
            <span class="phase-days-badge"><strong>${dDisp}</strong> gün</span>
          </div>
        </div>
        <div class="phase-subjects">${subHTML}</div>
        <div class="progress-row">
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${fill}99"></div></div>
          <div class="progress-label">%${pct} · ${e}/${totalDays}g</div>
        </div>
      </div>`;
    el.appendChild(div);
  });
}

// ══════════════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════════════
const TR_MONTHS=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const calState={oncesi:{events:[],viewYear:0,viewMonth:0},sonrasi:{events:[],viewYear:0,viewMonth:0}};

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

function buildEvents(prog){
  const phases=prog==='oncesi'?phasesOncesi:phasesSonrasi;
  const input=document.getElementById('cal-'+prog+'-date').value;
  if(!input)return[];
  let cur=new Date(input+'T00:00:00');
  const events=[];
  const passCount=[0,0,0,0];
  const passLabels=['','(2. geçiş)','(3. geçiş)'];

  phases.forEach(ph=>{
    let label,color,days;
    if(ph.type==='blok'){
      const b=blockDefs[ph.blokIdx];
      passCount[ph.blokIdx]++;
      const pass=passCount[ph.blokIdx];
      const passStr=pass>1?` ${passLabels[pass-1]}`:'';
      label=`${b.block}. Blok${passStr}`;
      color=b.color;
      days=prog==='oncesi'?blockDays(b):b.subjects.length;
    } else if(ph.type==='tekrar'||ph.type==='tekrar-s'){
      label=ph.label;color='#facc15';days=1;
    } else if(ph.type==='genel'){
      label='Genel Deneme';color='#34d399';days=1;
    }
    for(let i=0;i<days;i++){
      const d=addDays(cur,i);
      events.push({date:new Date(d),label,color});
    }
    cur=addDays(cur,days);
  });
  return events;
}

function generateCal(prog){
  const input=document.getElementById('cal-'+prog+'-date').value;
  if(!input){alert('Başlangıç tarihi seç!');return;}
  const events=buildEvents(prog);
  calState[prog].events=events;
  const startDate=new Date(input+'T00:00:00');
  calState[prog].viewYear=startDate.getFullYear();
  calState[prog].viewMonth=startDate.getMonth();
  document.getElementById('cal-'+prog+'-header-bar').style.display='flex';
  document.getElementById('cal-'+prog+'-dow').style.display='grid';
  renderCalGrid(prog);
}

function renderCalGrid(prog){
  const {viewYear,viewMonth,events}=calState[prog];
  document.getElementById('cal-'+prog+'-title').textContent=`${TR_MONTHS[viewMonth]} ${viewYear}`;
  const grid=document.getElementById('cal-'+prog+'-grid');
  grid.innerHTML='';

  const firstDay=new Date(viewYear,viewMonth,1);
  // Monday-based: 0=Mon..6=Sun
  let startOffset=(firstDay.getDay()+6)%7;
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const today=new Date();

  // Prev month fill
  const prevDays=new Date(viewYear,viewMonth,0).getDate();
  for(let i=startOffset-1;i>=0;i--){
    const cell=document.createElement('div');
    cell.className='cal-cell other-month';
    cell.innerHTML=`<div class="cal-num">${prevDays-i}</div>`;
    grid.appendChild(cell);
  }

  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const cell=document.createElement('div');
    const thisDate=new Date(viewYear,viewMonth,d);
    const isToday=today.getFullYear()===viewYear&&today.getMonth()===viewMonth&&today.getDate()===d;
    cell.className='cal-cell'+(isToday?' today':'');

    const numDiv=document.createElement('div');
    numDiv.className='cal-num';
    numDiv.textContent=d;
    cell.appendChild(numDiv);

    // Events for this day
    const dayEvents=events.filter(ev=>ev.date.getFullYear()===viewYear&&ev.date.getMonth()===viewMonth&&ev.date.getDate()===d);
    dayEvents.forEach(ev=>{
      const evDiv=document.createElement('div');
      evDiv.className='cal-event';
      evDiv.style.background=ev.color;
      evDiv.textContent=ev.label;
      cell.appendChild(evDiv);
    });

    grid.appendChild(cell);
  }

  // Next month fill
  const totalCells=Math.ceil((startOffset+daysInMonth)/7)*7;
  let nextDay=1;
  for(let i=startOffset+daysInMonth;i<totalCells;i++){
    const cell=document.createElement('div');
    cell.className='cal-cell other-month';
    cell.innerHTML=`<div class="cal-num">${nextDay++}</div>`;
    grid.appendChild(cell);
  }
}

function calNav(prog,dir){
  calState[prog].viewMonth+=dir;
  if(calState[prog].viewMonth>11){calState[prog].viewMonth=0;calState[prog].viewYear++;}
  if(calState[prog].viewMonth<0){calState[prog].viewMonth=11;calState[prog].viewYear--;}
  renderCalGrid(prog);
}

function switchCalProg(prog,btn){
  document.querySelectorAll('.cal-prog').forEach(p=>p.style.display='none');
  document.querySelectorAll('#page-takvim .prog-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cal-'+prog).style.display='block';
  btn.classList.add('active');
}

// ══════════════════════════════════════════════════
// STOPWATCH
// ══════════════════════════════════════════════════
let swRunning=false,swStart=0,swElapsed=0,swInterval=null;
const todayKey='sw-'+new Date().toDateString();
let todayTotal=parseInt(localStorage.getItem(todayKey)||'0');

function swToggle(){
  if(swRunning){
    swRunning=false;
    clearInterval(swInterval);
    const elapsed=Date.now()-swStart;
    swElapsed+=elapsed;
    todayTotal+=elapsed;
    localStorage.setItem(todayKey,todayTotal);
    document.getElementById('sw-main-btn').textContent='Başlat';
    document.getElementById('sw-main-btn').className='sw-btn sw-start';
    renderSwHistory();
  } else {
    swRunning=true;
    swStart=Date.now();
    swInterval=setInterval(swTick,50);
    document.getElementById('sw-main-btn').textContent='Durdur';
    document.getElementById('sw-main-btn').className='sw-btn sw-stop';
  }
}

function swReset(){
  swRunning=false;clearInterval(swInterval);swElapsed=0;
  document.getElementById('sw-main-btn').textContent='Başlat';
  document.getElementById('sw-main-btn').className='sw-btn sw-start';
  swUpdate(0);
}

function swTick(){
  const total=swElapsed+(Date.now()-swStart);
  swUpdate(total);
  const td=todayTotal+(Date.now()-swStart);
  document.getElementById('sw-today-display').textContent=msToHMS(td);
}

function swUpdate(ms){
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  const s=Math.floor((ms%60000)/1000);
  const cs=Math.floor((ms%1000)/10);
  document.getElementById('sw-h').textContent=String(h).padStart(2,'0');
  document.getElementById('sw-m').textContent=String(m).padStart(2,'0');
  document.getElementById('sw-s').textContent=String(s).padStart(2,'0');
  document.getElementById('sw-ms').textContent=String(cs).padStart(2,'0');
}

function msToHMS(ms){
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  const s=Math.floor((ms%60000)/1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function renderSwHistory(){
  const el=document.getElementById('sw-history');
  // Collect all sw- keys from localStorage
  const entries=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('sw-')){
      const dateStr=k.slice(3);
      const ms=parseInt(localStorage.getItem(k)||'0');
      if(ms>0) entries.push({dateStr,ms});
    }
  }
  entries.sort((a,b)=>new Date(b.dateStr)-new Date(a.dateStr));
  if(!entries.length){el.innerHTML='';return;}

  let html=`<div style="padding:10px 14px;border-bottom:1px solid var(--border);font-family:DM Mono,monospace;font-size:0.72rem;color:var(--muted)">Geçmiş Çalışma Süreleri</div>`;
  entries.forEach(e=>{
    const isToday=e.dateStr===new Date().toDateString();
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)">
      <span style="font-family:DM Mono,monospace;font-size:0.75rem;color:${isToday?'#a5b4fc':'var(--muted)'}">${e.dateStr}</span>
      <span style="font-family:DM Mono,monospace;font-size:0.85rem;color:${isToday?'#a5b4fc':'var(--text);'};font-weight:500">${msToHMS(e.ms)}</span>
    </div>`;
  });
  html=html.replace(/border-bottom:1px solid var\(--border\)">\s*$/, '">'); // remove last border
  el.innerHTML=html;
}

document.getElementById('sw-today-display').textContent=msToHMS(todayTotal);
renderSwHistory();

// ══════════════════════════════════════════════════
// SOURCE TRACKER
// ══════════════════════════════════════════════════
const allSubjects=blockDefs.flatMap(b=>b.subjects.map(s=>({name:s.name,block:b.block,color:b.color})));
const defaultSources=['Dusdatamax','Prodent','1+2','TTS'];
const TRACKER_KEY='dus-tracker-v1';
const SOURCES_KEY='dus-sources-v1';

function loadTracker(){
  try{return JSON.parse(localStorage.getItem(TRACKER_KEY)||'{}');}catch{return {};}
}
function saveTracker(data){localStorage.setItem(TRACKER_KEY,JSON.stringify(data));}
function loadSources(){
  try{return JSON.parse(localStorage.getItem(SOURCES_KEY)||JSON.stringify(defaultSources));}catch{return defaultSources;}
}
function saveSources(s){localStorage.setItem(SOURCES_KEY,JSON.stringify(s));}

function toggleTracker(subj,source){
  const data=loadTracker();
  const key=subj+'||'+source;
  if(!data[key]) data[key]='done';
  else if(data[key]==='done') data[key]='not';
  else delete data[key];
  saveTracker(data);
  renderTracker();
}

function renderTracker(){
  const sources=loadSources();
  const data=loadTracker();
  const container=document.getElementById('tracker-content');
  container.innerHTML='';

  blockDefs.forEach(b=>{
    const section=document.createElement('div');
    section.className='tracker-section';

    const title=document.createElement('div');
    title.className='tracker-block-title';
    title.innerHTML=`<span style="color:${b.color};font-size:1.2rem">${b.block}</span> <span>${b.title}</span>`;
    section.appendChild(title);

    const table=document.createElement('table');
    table.className='tracker-table';

    // Header
    const thead=document.createElement('thead');
    thead.innerHTML=`<tr><th>Ders</th>${sources.map(s=>`<th>${s}</th>`).join('')}</tr>`;
    table.appendChild(thead);

    // Body
    const tbody=document.createElement('tbody');
    b.subjects.forEach(s=>{
      const tr=document.createElement('tr');
      let cells=`<td style="color:${b.color}">${s.name}</td>`;
      sources.forEach(src=>{
        const key=s.name+'||'+src;
        const state=data[key];
        const cls=state==='done'?'done':state==='not'?'not-done':'empty';
        const icon=state==='done'?'✔️':state==='not'?'❌':'·';
        cells+=`<td><button class="tracker-btn ${cls}" onclick="toggleTracker('${s.name}','${src}')">${icon}</button></td>`;
      });
      tr.innerHTML=cells;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    section.appendChild(table);
    container.appendChild(section);
  });
}

function addSource(){
  const input=document.getElementById('new-source-input');
  const val=input.value.trim();
  if(!val)return;
  const sources=loadSources();
  if(!sources.includes(val)){sources.push(val);saveSources(sources);}
  input.value='';
  renderTracker();
}
